<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>Library</h1>
  <button command="show-modal" commandfor="form-dialog">Add Book</button>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>
        <th>Read</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>

  <dialog id="form-dialog">
    <form>
      <label for="title">Title</label>
      <input type="text" id="title" name="title">
      <label for="author">Author</label>
      <input type="text" id="author" name="author">
      <label for="year">Year</label>
      <input type="text" id="year" name="year">
      <label for="yes">Yes</label>
      <input type="radio" id="yes" name="read" value="Yes">
      <label for="no">No</label>
      <input type="radio" id="no" name="read" value="No">
      <button type="submit" id="submit">Submit</button>
      <input type="reset" name="reset">
    </form>
    <button commandfor="form-dialog" command="close">Close</button>
  </dialog>

  <script src="script.js"></script>
</body>

</html>
